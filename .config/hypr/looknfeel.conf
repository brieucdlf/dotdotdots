# Change the default Omarchy look'n'feel

general {
    border_size = 2
    col.active_border   = rgba(d4b88aff) rgba(8a6838ff) 45deg   # nurburgreen gold
    col.inactive_border = rgba(1a1e1a66)                        # carbon inactif
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 12
        passes = 4
        brightness = 0.82
        contrast = 0.9
        noise = 0.015
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0c181088)
    }
}

# blur behind waybar (matches terminal transparency)
layerrule = blur on, match:namespace waybar

# todo popup — floating editor
windowrule = float on, match:class todo-popup
windowrule = size 680 480, match:class todo-popup
windowrule = center on, match:class todo-popup
