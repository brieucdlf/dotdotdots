source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

# Background — less blur, slightly darkened for depth
background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 2
    blur_size = 6
    brightness = 0.65
    contrast = 0.9
    noise = 0.01
}

animations {
    enabled = true
    fade_in = 0.3
    fade_out = 0.2
}

# Frosted glass card behind content
shape {
    monitor =
    size = 460, 520
    color = rgba(0, 20, 10, 0.55)
    rounding = 24
    border_size = 1
    border_color = rgba(212, 184, 138, 0.18)
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 20
    shadow_color = rgba(0, 0, 0, 0.4)
    shadow_boost = 1.2
}

# Profile picture
image {
    monitor =
    path = ~/.face/face.jpeg
    size = 88
    rounding = -1
    position = 0, 220
    halign = center
    valign = center
    border_size = 2
    border_color = rgba(212, 184, 138, 0.4)
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(212, 184, 138, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 115
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.7)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "<span>$(date +"%A %d %B")</span>"
    color = rgba(138, 104, 53, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 62
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Password input
input-field {
    monitor =
    size = 360, 50
    position = 0, -80
    halign = center
    valign = center

    inner_color = rgba(0, 15, 8, 0.7)
    outer_color = rgba(212, 184, 138, 0.35)
    outline_thickness = 1

    font_family = JetBrainsMono Nerd Font
    font_color = rgba(212, 184, 138, 1.0)
    font_size = 13

    placeholder_text = <span foreground="##8a6835"> password...</span>
    check_color = rgba(240, 192, 0, 1.0)
    fail_color = rgba(160, 96, 48, 1.0)
    fail_text = <span foreground="##a06030"><i>$FAIL  ($ATTEMPTS)</i></span>

    rounding = 16
    shadow_passes = 1
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
    fade_on_empty = true
    dots_spacing = 0.35
    dots_center = true
    dots_rounding = -1
}

auth {
    fingerprint:enabled = true
}
