source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
    blur_size = 8
}

animations {
    enabled = true
    fade_in = 0.3
    fade_out = 0.2
}

# Drop any image at ~/.face to show a profile picture
image {
    monitor =
    path = ~/.face
    size = 100
    rounding = -1
    position = 0, 220
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%H:%M")</span>"
    color = rgba(212, 184, 138, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "<span>$(date +"%A %d %B %Y")</span>"
    color = rgba(138, 104, 53, 1.0)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.6)
}

# Password input
input-field {
    monitor =
    size = 400, 55
    position = 0, -80
    halign = center
    valign = center

    inner_color = rgba(0, 26, 15, 0.85)
    outer_color = rgba(212, 184, 138, 0.6)
    outline_thickness = 2

    font_family = JetBrainsMono Nerd Font
    font_color = rgba(212, 184, 138, 1.0)
    font_size = 14

    placeholder_text = <span foreground="##8a6835"> password...</span>
    check_color = rgba(240, 192, 0, 1.0)
    fail_color = rgba(138, 96, 48, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 8
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.5)
    fade_on_empty = true
    dots_spacing = 0.3
    dots_center = true
}

auth {
    fingerprint:enabled = true
}
