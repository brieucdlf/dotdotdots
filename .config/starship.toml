add_newline = true
command_timeout = 200

format = """
[╭─](bold #2a5a3a)$directory$git_branch$git_status$nodejs$golang$python$cmd_duration
[╰─](bold #2a5a3a)$character"""

[character]
error_symbol   = "[▶](bold #6b3a1f)"
success_symbol = "[▶](bold #2a5a3a)"

[directory]
style             = "bold #d4b88a"
truncation_length = 2
truncation_symbol = "…/"
repo_root_style   = "bold #0a6b38"
repo_root_format  = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)"

[git_branch]
format = " [ $branch]($style)"
style  = "italic #8a6835"

[git_status]
format     = '[$all_status]($style)'
style      = "#5a3a1a"
ahead      = "⇡${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
behind     = "⇣${count}"
conflicted = ""
up_to_date = ""
untracked  = " ?"
modified   = " "
stashed    = ""
staged     = " +"
renamed    = ""
deleted    = " ✘"

[cmd_duration]
format   = " [${duration}]($style)"
style    = "#5a3a1a"
min_time = 2000

[nodejs]
format         = " [node $version]($style)"
style          = "#2a5a3a"
detect_files   = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[golang]
format       = " [go $version]($style)"
style        = "#2a5a3a"
detect_files = ["go.mod", "go.sum"]

[python]
format       = " [py $version]($style)"
style        = "#2a5a3a"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version"]
