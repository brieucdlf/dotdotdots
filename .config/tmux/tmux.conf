set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g mouse on

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# window / pane index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# no escape delay (vim)
set -s escape-time 5

# splits
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# resize panes
bind-key -n C-M-j resize-pane -D 5
bind-key -n C-M-k resize-pane -U 5
bind-key -n C-M-h resize-pane -L 5
bind-key -n C-M-l resize-pane -R 5

# vim pane navigation
unbind-key j
unbind-key k
unbind-key h
unbind-key l
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# clear history
bind -n C-b send-keys -R \; clear-history

# vi copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# window navigation
bind -n M-H previous-window
bind -n M-L next-window

# ── Paddock theme ─────────────────────────────────────────────────────────────
#   background #0f1a13  foreground #d6ccaa  accent #c9a84c
#   green      #5aab72  muted      #2e4a38  inactive #527a62

# pane borders
set -g pane-border-style          "fg=#2e4a38"
set -g pane-active-border-style   "fg=#5aab72"

# status bar
set -g status on
set -g status-position bottom
set -g status-style               "bg=#0f1a13,fg=#d6ccaa"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left  "#[fg=#0f1a13,bg=#c9a84c,bold] #S #[fg=#c9a84c,bg=#0f1a13,nobold]  "
set -g status-right "#[fg=#527a62]%d %b  #[fg=#d6ccaa]%H:%M "

# windows
set -g window-status-format         "#[fg=#527a62,bg=#0f1a13] #I #W "
set -g window-status-current-format "#[fg=#0f1a13,bg=#5aab72,bold] #I #W #[fg=#5aab72,bg=#0f1a13,nobold]"

# messages / command prompt
set -g message-style        "fg=#c9a84c,bg=#1c2b21"
set -g message-command-style "fg=#c9a84c,bg=#1c2b21"

# copy mode highlight
set -g mode-style "fg=#0f1a13,bg=#c9a84c"

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m"

run '~/.tmux/plugins/tpm/tpm'
