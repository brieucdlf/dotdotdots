set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g mouse on

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# window / pane index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# no escape delay (vim)
set -s escape-time 5

# splits
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# resize panes
bind-key -n C-M-j resize-pane -D 5
bind-key -n C-M-k resize-pane -U 5
bind-key -n C-M-h resize-pane -L 5
bind-key -n C-M-l resize-pane -R 5

# vim pane navigation
unbind-key j
unbind-key k
unbind-key h
unbind-key l
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# clear history
bind -n C-b send-keys -R \; clear-history

# vi copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# window navigation
bind -n M-H previous-window
bind -n M-L next-window

# ── Paddock theme v3 ──────────────────────────────────────────────────────────
#   background #001a0f  foreground #d4b88a  accent #f0c000
#   BRG exact  #004225  bright     #0a6b38  muted  #132b1d  inactive #2a5a3a

# pane borders
set -g pane-border-style          "fg=#2a2e2a"
set -g pane-active-border-style   "fg=#2a5a3a"

# status bar
set -g status on
set -g status-position bottom
set -g status-style               "bg=#0e100e,fg=#d4b88a"
set -g status-bg                  "#0e100e"
set -g status-fg                  "#d4b88a"
set -g status-left-length 40
set -g status-right-length 140
set -g status-interval 5

set -g status-left  "#[fg=#0c100c,bg=#8a6835,bold] #S #[fg=#8a6835,bg=#0e100e,nobold]  "
set -g status-right "#[fg=#5a3a1a]#(~/.dots/bin/tmux-claude-status)  #[fg=#2a5a3a] #(cd #{pane_current_path} && git branch --show-current 2>/dev/null)  #[fg=#8a6835]⎈ #(kubectl config current-context 2>/dev/null) "

# windows
set -g window-status-format         "#[fg=#5a3a1a,bg=#0e100e] #I #{b:pane_current_path} "
set -g window-status-current-format "#[fg=#d4b88a,bg=#1a1e1a,bold] #I #{b:pane_current_path} #[fg=#1a1e1a,bg=#0e100e,nobold]"

# messages / command prompt
set -g message-style         "fg=#d4b88a,bg=#0e100e"
set -g message-command-style "fg=#d4b88a,bg=#0e100e"

# copy mode highlight
set -g mode-style "fg=#0c100c,bg=#8a6835"

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m"

run '~/.tmux/plugins/tpm/tpm'

# ── Startup layout ────────────────────────────────────────────────────────────
set-hook -g after-new-session \
  'split-window -h -l 35% ; send-keys "cd ~/todo && claude" Enter ; select-pane -t left'
