set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g mouse on

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# window / pane index starts at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# no escape delay (vim)
set -s escape-time 5

# splits
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# resize panes
bind-key -n C-M-j resize-pane -D 5
bind-key -n C-M-k resize-pane -U 5
bind-key -n C-M-h resize-pane -L 5
bind-key -n C-M-l resize-pane -R 5

# vim pane navigation
unbind-key j
unbind-key k
unbind-key h
unbind-key l
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

# clear history
bind -n C-b send-keys -R \; clear-history

# vi copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# window navigation
bind -n M-H previous-window
bind -n M-L next-window

# ── Paddock theme v3 ──────────────────────────────────────────────────────────
#   background #001a0f  foreground #d4b88a  accent #f0c000
#   BRG exact  #004225  bright     #0a6b38  muted  #132b1d  inactive #2a5a3a

# pane borders
set -g pane-border-style          "fg=#132b1d"
set -g pane-active-border-style   "fg=#004225"

# status bar
set -g status on
set -g status-position bottom
set -g status-style               "bg=#001a0f,fg=#d4b88a"
set -g status-bg                  "#001a0f"
set -g status-fg                  "#d4b88a"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left  "#[fg=#001a0f,bg=#f0c000,bold] #S #[fg=#f0c000,bg=#001a0f,nobold]  "
set -g status-right "#[fg=#2a5a3a]%d %b  #[fg=#d4b88a]%H:%M "

# windows
set -g window-status-format         "#[fg=#2a5a3a,bg=#001a0f] #I #{b:pane_current_path} "
set -g window-status-current-format "#[fg=#f0c000,bg=#004225,bold] #I #{b:pane_current_path} #[fg=#004225,bg=#001a0f,nobold]"

# messages / command prompt
set -g message-style         "fg=#f0c000,bg=#0a1f13"
set -g message-command-style "fg=#f0c000,bg=#0a1f13"

# copy mode highlight
set -g mode-style "fg=#001a0f,bg=#f0c000"

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'

TMUX_FZF_LAUNCH_KEY="C-f"
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m"

run '~/.tmux/plugins/tpm/tpm'
